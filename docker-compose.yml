services:
  stock-checker:
    build: .
    container_name: stock-checker
    restart: unless-stopped
    ports:
      - "8088:3001"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:?Set GEMINI_API_KEY in Portainer stack environment}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      PORT: "3001"
      STATIC_DIR: /app/web/dist
